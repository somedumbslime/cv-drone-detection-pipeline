project_name: drone-object-detection-pipeline
data_preparation:
  cvat_root: data/processed/CVAT
  yolo_root: data/processed/YOLO
  tile_root: data/processed/TILED
  split:
    train: 0.7
    val: 0.2
    test: 0.1
    seed: 42
  tiling:
    tile_size: [640, 384]
    overlap: 0.25
    keep_ratio: 0.4
    min_box_px: 4
    empty_to_positive_ratio: 1.0
    seed: 42
  extract_frames:
    input_dir: data/raw
    output_dir: data/interim/frames
    sample_fps: 2.0
    image_ext: jpg
  deduplicate:
    input_dir: data/interim/frames
    output_dir: data/interim/unique_frames
    hash_size: 8
    hamming_threshold: 5
train:
  model: yolo26n.pt
  data: data/processed/TILED/dataset.yaml
  epochs: 50
  imgsz: 640
  batch: 16
  device: cuda
  project: runs/train
  name: drone_detection
evaluate:
  weights: models/weights/best26n.pt
  data: data/processed/TILED/dataset.yaml
  split: test
  imgsz: 640
  batch: 16
  device: cuda
  output: metrics.json
export:
  weights: models/weights/best26n.pt
  imgsz: 640
  format: onnx
  dynamic: false
  simplify: true
  output_dir: models/onnx
inference:
  weights: models/weights/best26n.onnx
  conf: 0.284
  image:
    input_dir: data/processed/TILED/images/test
    output_dir: data/processed/processed_photo
    output_suffix: _bbox
  video:
    input_dir: data/video/input
    output_dir: data/video/output
    output_suffix: _pred
    output_ext: .mp4
  data: data/processed/TILED/dataset.yaml
api:
  weights: models/weights/best26n.pt
