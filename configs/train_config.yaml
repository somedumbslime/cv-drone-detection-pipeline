project_name: drone-object-detection-pipeline

data_preparation:
  cvat_root: data/processed/CVAT
  yolo_root: data/processed/YOLO
  split:
    train: 0.7
    val: 0.2
    test: 0.1
    seed: 42
  extract_frames:
    input_dir: data/raw
    output_dir: data/interim/frames
    sample_fps: 2.0
    image_ext: jpg
  deduplicate:
    input_dir: data/interim/frames
    output_dir: data/interim/unique_frames
    hash_size: 8
    hamming_threshold: 5

train:
  model: yolo11n.pt
  data: data/processed/YOLO/dataset.yaml
  epochs: 50
  imgsz: 640
  batch: 16
  device: cuda
  project: runs/train
  name: drone_detection

evaluate:
  weights: models/weights/best.pt
  data: data/processed/YOLO/dataset.yaml
  split: test
  imgsz: 640
  batch: 16
  device: cuda
  output: metrics.json

export:
  weights: models/weights/best.pt
  imgsz: 640
  format: onnx
  dynamic: false
  simplify: true
  output_dir: models/onnx

inference:
  weights: models/weights/best.pt
  conf: 0.25
  image:
    input: examples/input/sample.jpg
    output: examples/output/pred_sample.jpg
  video:
    input: examples/input/sample.mp4
    output: examples/output/pred_sample.mp4

api:
  weights: models/weights/best.pt
