train:
  model: yolo11n.pt
  data: config/dataset.yaml
  epochs: 50
  imgsz: 640
  batch: 16
  device: auto
  project: runs/train
  name: drone_detection

inference:
  weights: models/weights/yolo_best.pt
  conf: 0.25
  image:
    input: examples/input/sample.jpg
    output: examples/output/pred_sample.jpg
  video:
    input: examples/input/sample.mp4
    output: examples/output/pred_sample.mp4
